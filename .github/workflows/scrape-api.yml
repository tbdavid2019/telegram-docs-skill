on:
  workflow_dispatch: {} # Allow manually kicking off builds
  schedule:
    # GitHub may delay or drop jobs scheduled at the top of the hour.
    # Changing the cron also re-enables a disabled scheduled workflow.
    - cron:  '17 12 * * *' # Every day at 12:17 UTC.
name: Scrape telegram bot API
jobs:
  build:
    name: Scrape
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: >
        pip install -r requirements.txt

    - name: Scrape website
      run: python scrape.py

    - name: Open Pull Request
      uses: peter-evans/create-pull-request@v8
      with:
        commit-message: >
          Regenerate bot API docs.
        title: >
          Update bot API docs based on the latest changes
        body: >
          This is an automated PR. Please check the diff, and the action logs, to check for any funky behaviour.
        branch: automated/bot-api-update
        labels: automated
        delete-branch: true
